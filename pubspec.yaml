name: aura_coach_ai
description: AI-powered English learning app with Clay Design System.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  firebase_core: ^3.8.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.0
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.4
  provider: ^6.1.5+1
  go_router: ^17.0.0
  shared_preferences: ^2.3.0
  cached_network_image: ^3.4.1
  google_fonts: ^7.0.0
  uuid: ^4.1.0
  intl: ^0.20.0
  google_generative_ai: ^0.4.6
  flutter_dotenv: ^5.2.1
  flutter_tts: ^4.2.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env
