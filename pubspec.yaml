name: aura_coach_ai
description: AI-powered English learning app with Clay Design System.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1
  provider: ^6.1.5+1
  go_router: ^17.0.0
  shared_preferences: ^2.3.0
  cached_network_image: ^3.4.1
  google_fonts: ^8.0.2
  uuid: ^4.1.0
  intl: ^0.20.0
  google_generative_ai: ^0.4.6
  flutter_dotenv: ^6.0.1
  flutter_tts: ^4.2.0
  shimmer: ^3.0.0
  lottie: ^3.1.0
  crypto: ^3.0.3
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  permission_handler: ^12.0.0
  purchases_flutter: ^10.0.1
  purchases_ui_flutter: ^10.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - .env
    - assets/data/
