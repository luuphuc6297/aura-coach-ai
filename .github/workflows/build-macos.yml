name: Build macOS

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

env:
  FLUTTER_VERSION: "3.29.0"
  FLUTTER_CHANNEL: "stable"

jobs:
  build:
    name: Build macOS app
    runs-on: macos-14
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Inject .env
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: echo "$ENV_FILE" | base64 --decode > .env

      - name: Inject GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.MACOS_GOOGLE_SERVICE_INFO_PLIST }}
        run: echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > macos/Runner/GoogleService-Info.plist

      - name: Install dependencies
        run: flutter pub get

      - name: Build macOS
        run: flutter build macos --release

      - name: Package .app
        run: |
          cd build/macos/Build/Products/Release
          zip -r aura_coach_ai-macos.zip aura_coach_ai.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aura_coach_ai-macos
          path: build/macos/Build/Products/Release/aura_coach_ai-macos.zip
          retention-days: 30
